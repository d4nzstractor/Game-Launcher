<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Launcher Gamer Pro</title>
    <style>
        :root {
            --bg-color: #0b0b0e;
            --card-bg: #16161a;
            --accent-color: #0078d4;
            --text-main: #ffffff;
            --text-secondary: #949494;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px 40px;
        }

        header {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input, select, button {
            background: #25252b;
            border: none;
            border-radius: 8px;
            padding: 10px;
            color: white;
        }

        button {
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--accent-color);
        }

        #container {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .letter-section {
            max-width: 1200px;
            margin: auto;
            margin-bottom: 40px;
        }

        .letter-section h2 {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
        }

        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0,120,212,0.4);
        }

        .game-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .game-info {
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        #noResults {
            text-align: center;
            display: none;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

<header>
    <h1>🎮 Mi Biblioteca</h1>
    <div class="controls">
        <button id="toggleBtn" onclick="cambiarModo()">🔠 Ver por letras</button>
        <input type="text" id="search" placeholder="Buscar..." onkeyup="actualizar()">
        <select id="order" onchange="actualizar()">
            <option value="asc">A - Z</option>
            <option value="desc">Z - A</option>
            <option value="played">Jugado Recientemente</option>
        </select>
    </div>
</header>

<main id="container"></main>
<p id="noResults">No se encontró ningún juego.</p>

<script>

    { id:"stardew", nombre:"Stardew Valley", ruta:"C:\\Program Files (x86)\\Steam\\steamapps\\common\\Stardew Valley\\StardewModdingAPI.exe", img:"imagenes/stardew.png" },

    { id:"zomboid", nombre:"Project Zomboid", ruta:"C:\\Users\\daliu\\Downloads\\COZAS\\Project Zomboid\\Project Zomboid\\ProjectZomboid64.exe", img:"imagenes/zomboid.jpg" },
    { id:"bonk", nombre:"Megabonk", ruta:"steam://rungameid/3405340", img:"imagenes/megabonk.jpg" },

    { id:"roblo", nombre:"Roblox", ruta:"C:\\Users\\daliu\\AppData\\Local\\Roblox\\Versions\\version-80c7b8e578f241ff\\RobloxPlayerBeta.exe", img:"imagenes/roblo.jpg" },
    { id:"rocket", nombre:"Rocket League", ruta:"C:\\Program Files (x86)\\Epic Games\\rocketleague\\Binaries\\Win64\\RocketLeague.exe", img:"imagenes/rocket.jpg" },
    { id:"tp", nombre:"The Legend of Zelda Twilight Princess HD", tipo:"cemu", ruta:"C:\\Users\\daliu\\Downloads\\COZAS\\Cemu_2.6\\JUEGOS\\DATA\\EUR\\GAMES\\THE LEGEND OF ZELDA Twilight Princess HD [000500001019E600]\\Base Games\\THE LEGEND OF ZELDA Twilight Princess HD [AZAP01]\\code\\Zelda.rpx", img:"imagenes/tp.jpg" },

function abrirJuego(id, ruta, tipo) {
    localStorage.setItem("last_" + id, Date.now());

    // Si tiene tipo (cemu, pcsx2), mandamos objeto. Si no, mandamos ruta (string).
    if (tipo) {
        ipcRenderer.send("abrir-juego", { tipo, ruta });
    } else {
        ipcRenderer.send("abrir-juego", ruta);
    }
    actualizar();
}

function cambiarModo() {
    const btn = document.getElementById("toggleBtn");
    if (modo === "letras") {
        modo = "todo";
        btn.innerText = "🔠 Ver por letras";
    } else {
        modo = "letras";
        btn.innerText = "📦 Ver todos los juegos";
    }
    actualizar();
}

function actualizar() {
    const search = document.getElementById("search").value.toLowerCase();
    const order = document.getElementById("order").value;
    const container = document.getElementById("container");
    const noResults = document.getElementById("noResults");

    let lista = juegos.filter(j => j.nombre.toLowerCase().includes(search));

    if (order === "asc") lista.sort((a, b) => a.nombre.localeCompare(b.nombre));
    if (order === "desc") lista.sort((a, b) => b.nombre.localeCompare(a.nombre));
    if (order === "played") lista.sort((a, b) => (localStorage.getItem("last_" + b.id) || 0) - (localStorage.getItem("last_" + a.id) || 0));

    noResults.style.display = lista.length === 0 ? "block" : "none";

    container.style.opacity = "0";
    container.style.transform = "translateY(10px)";

    setTimeout(() => {
        container.innerHTML = "";
        if (modo === "letras" && order !== "played" && search === "") {
            const grupos = {};
            lista.forEach(j => {
                const letra = j.nombre[0].toUpperCase();
                if (!grupos[letra]) grupos[letra] = [];
                grupos[letra].push(j);
            });
            Object.keys(grupos).sort().forEach(letra => crearSeccion(letra, grupos[letra], container));
        } else {
            crearSeccion("Juegos", lista, container);
        }
        container.style.opacity = "1";
        container.style.transform = "translateY(0px)";
    }, 150);
}

function crearSeccion(titulo, lista, padre) {
    const section = document.createElement("section");
    section.className = "letter-section";
    section.innerHTML = `<h2>${titulo}</h2>`;
    const grid = document.createElement("div");
    grid.className = "library-grid";

    lista.forEach(j => {
        const card = document.createElement("div");
        card.className = "game-card";
        card.onclick = () => abrirJuego(j.id, j.ruta, j.tipo);
        card.innerHTML = `
            <img src="${j.img}" onerror="this.src='https://via.placeholder.com/200x250?text=Sin+Imagen'">
            <div class="game-info">${j.nombre}</div>
        `;
        grid.appendChild(card);
    });
    section.appendChild(grid);
    padre.appendChild(section);
}

window.onload = actualizar;
</script>
</body>
</html>
