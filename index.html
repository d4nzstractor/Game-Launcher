<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gamer Launcher Pro</title>

    <style>
        :root {
            --bg-color: #0b0b0e;
            --card-bg: #16161a;
            --accent-color: #0078d4;
            --text-main: #ffffff;
            --text-secondary: #949494;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px 40px;
        }

        header {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input, select, button {
            background: #25252b;
            border: none;
            border-radius: 8px;
            padding: 10px;
            color: white;
        }

        
        button {
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--accent-color);
        }

        #container {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .letter-section {
            max-width: 1200px;
            margin: auto;
            margin-bottom: 40px;
        }

        .letter-section h2 {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
        }

        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0,120,212,0.4);
        }

        .game-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .game-info {
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        #noResults {
            text-align: center;
            display: none;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>

<header>
    <h1>🎮 My Library</h1>

    <div class="controls">
        <button id="toggleBtn" onclick="changeMode()">🔠 View by letters</button>

        <input type="text" id="search" placeholder="Search..." onkeyup="update()">

        <select id="order" onchange="update()">
            <option value="asc">A - Z</option>
            <option value="desc">Z - A</option>
            <option value="played">Recently Played</option>
        </select>
    </div>
</header>

<main id="container"></main>
<p id="noResults">No games found.</p>

<script>
const { ipcRenderer } = require("electron");

let mode = "all";

const games = [
    { id:"balatro", name:"Balatro", path:"C:\\Games\\Balatro\\Balatro.exe", img:"images/balatro.jpg" },
    { id:"cities", name:"Cities Skylines", path:"C:\\Games\\CitiesSkylines\\Cities.exe", img:"images/cities.jpg" },
    { id:"ff9", name:"Final Fantasy IX", path:"C:\\Games\\FinalFantasyIX\\FF9_Launcher.exe", img:"images/ff9.jpg" },
    { id:"gd", name:"Geometry Dash", path:"steam://rungameid/322170", img:"images/geometry-dash.jpg" },
    { id:"subnautica", name:"Subnautica", path:"C:\\Games\\Subnautica\\Subnautica.exe", img:"images/subnautica.jpg" },
    { id:"stardew", name:"Stardew Valley", path:"C:\\Games\\StardewValley\\StardewModdingAPI.exe", img:"images/stardew.jpg" },
    { id:"wow", name:"World of Warcraft", path:"C:\\Games\\WorldOfWarcraft\\Wow.exe", img:"images/wow.jpg" },
    { id:"zomboid", name:"Project Zomboid", path:"C:\\Games\\ProjectZomboid\\ProjectZomboid64.exe", img:"images/zomboid.jpg" },
    { id:"bonk", name:"Megabonk", path:"steam://rungameid/3405340", img:"images/megabonk.jpg" },
    { id:"blasph", name:"Blasphemous", path:"steam://rungameid/774361", img:"images/blasph.jpg" },
    { id:"roblo", name:"Roblox", path:"C:\\Games\\Roblox\\RobloxPlayerBeta.exe", img:"images/roblox.jpg" },
    { id:"rocket", name:"Rocket League", path:"C:\\Games\\RocketLeague\\RocketLeague.exe", img:"images/rocket.jpg" },
    { id:"tp", name:"Zelda Twilight Princess HD", type:"cemu", path:"C:\\Games\\Cemu\\ZeldaTP\\game.rpx", img:"images/tp.jpg" },
    { id:"ww", name:"Zelda Wind Waker HD", type:"cemu", path:"C:\\Games\\Cemu\\WindWaker\\game.rpx", img:"images/ww.jpg" },
    { id:"vp2", name:"Valkyrie Profile 2", type:"pcsx2", path:"D:\\Games\\PS2\\VP2.iso", img:"images/vp2.jpg" },
    { id:"ass2", name:"Assassin's Creed II", path:"C:\\Games\\Ubisoft\\AC2\\AC2.exe", img:"images/ac2.jpg" },
    { id:"gta5", name:"Grand Theft Auto V", path:"C:\\Games\\GTAV\\GTA5.exe", img:"images/gta5.jpg" },
    { id:"golf", name:"Golf It", path:"steam://rungameid/571740", img:"images/golf.jpg" },
    { id:"tww3", name:"Total War: Warhammer III", path:"steam://rungameid/1142710", img:"images/tww3.jpg" },
    { id:"spp", name:"Slay the Spire", path:"steam://rungameid/646570", img:"images/spp.jpg" },
    { id:"hades", name:"Hades", path:"C:\\Games\\Hades\\Hades.exe", img:"images/hades.jpg" },
    { id:"terraria", name:"Terraria", path:"steam://rungameid/1281930", img:"images/terraria.jpg" },
    { id:"elden", name:"Elden Ring", path:"C:\\Games\\EldenRing\\eldenring.exe", img:"images/elden.jpg" },
    { id:"33", name:"Clair Obscur: Expedition 33", path:"C:\\Games\\Expedition33\\Expedition.exe", img:"images/expedition33.jpg" }
];

function openGame(id, path, type) {
    localStorage.setItem("last_" + id, Date.now());

    if (type) {
        ipcRenderer.send("open-game", { type, path });
    } else {
        ipcRenderer.send("open-game", path);
    }

    update();
}

function changeMode() {
    const btn = document.getElementById("toggleBtn");

    if (mode === "letters") {
        mode = "all";
        btn.innerText = "🔠 View by letters";
    } else {
        mode = "letters";
        btn.innerText = "📦 View all games";
    }

    update();
}

function update() {
    const search = document.getElementById("search").value.toLowerCase();
    const order = document.getElementById("order").value;
    const container = document.getElementById("container");
    const noResults = document.getElementById("noResults");

    let list = games.filter(g => g.name.toLowerCase().includes(search));

    if (order === "asc") list.sort((a,b)=>a.name.localeCompare(b.name));
    if (order === "desc") list.sort((a,b)=>b.name.localeCompare(a.name));
    if (order === "played") {
        list.sort((a,b)=>
            (localStorage.getItem("last_"+b.id)||0) -
            (localStorage.getItem("last_"+a.id)||0)
        );
    }

    noResults.style.display = list.length ? "none" : "block";

    container.style.opacity = "0";
    container.style.transform = "translateY(10px)";

    setTimeout(() => {
        container.innerHTML = "";

        if (mode === "letters" && order !== "played" && search === "") {
            const groups = {};

            list.forEach(g => {
                const letter = g.name[0].toUpperCase();
                if (!groups[letter]) groups[letter] = [];
                groups[letter].push(g);
            });

            Object.keys(groups).sort().forEach(letter => {
                createSection(letter, groups[letter], container);
            });

        } else {
            createSection("Games", list, container);
        }

        container.style.opacity = "1";
        container.style.transform = "translateY(0)";
    }, 150);
}

function createSection(title, list, parent) {
    const section = document.createElement("section");
    section.className = "letter-section";

    section.innerHTML = `<h2>${title}</h2>`;

    const grid = document.createElement("div");
    grid.className = "library-grid";

    list.forEach(g => {
        const card = document.createElement("div");
        card.className = "game-card";

        card.onclick = () => openGame(g.id, g.path, g.type);

        card.innerHTML = `
            <img src="${g.img}" onerror="this.src='https://via.placeholder.com/200x250?text=No+Image'">
            <div class="game-info">${g.name}</div>
        `;

        grid.appendChild(card);
    });

    section.appendChild(grid);
    parent.appendChild(section);
}

window.onload = update;
</script>

</body>
</html>
